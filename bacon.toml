[jobs.dev]
command = ["sh", "-c", "npm --prefix orchestrator run build:css && exec cargo run --color always -p cocompute_orchestrator -- serve"]
need_stdout = true
watch = ["orchestrator/src", "orchestrator/input.css", "orchestrator/static"]
allow_warnings = true
on_change_strategy = "kill_then_restart"

[jobs.check]
command = ["cargo", "check", "--color", "always", "-p", "cocompute_orchestrator"]
need_stdout = false
watch = ["orchestrator/src"]

[default]
job = "dev"
