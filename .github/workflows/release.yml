name: Release

on:
  push:
    branches:
      - master
      - main
    paths:
      - "Cargo.toml"

permissions:
  contents: write

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: |
          # Get current version from workspace Cargo.toml
          CURRENT=$(grep -A1 '\[workspace.package\]' Cargo.toml | grep 'version' | sed 's/.*"\(.*\)".*/\1/')

          # Get previous version
          git show HEAD~1:Cargo.toml > /tmp/old-cargo.toml 2>/dev/null || echo -e '[workspace.package]\nversion = "0.0.0"' > /tmp/old-cargo.toml
          PREVIOUS=$(grep -A1 '\[workspace.package\]' /tmp/old-cargo.toml | grep 'version' | sed 's/.*"\(.*\)".*/\1/')

          echo "current=$CURRENT"
          echo "previous=$PREVIOUS"

          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
            echo "Version changed: $PREVIOUS → $CURRENT"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $CURRENT"
          fi

  build-host:
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: cocompute-host-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: cocompute-host-macos-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: cocompute-host-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: cocompute-host-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install OpenSSL dev (Linux gnu)
        if: contains(matrix.target, 'gnu') && contains(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build host binary (musl - vendored OpenSSL)
        if: contains(matrix.target, 'musl')
        env:
          OPENSSL_STATIC: "1"
        run: cargo build --release --target ${{ matrix.target }} -p cocompute_host --features openssl-vendored

      - name: Build host binary
        if: "!contains(matrix.target, 'musl')"
        run: cargo build --release --target ${{ matrix.target }} -p cocompute_host

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cocompute_host dist/${{ matrix.name }}

      - name: Install minisign
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y minisign
          else
            brew install minisign
          fi

      - name: Sign binary with minisign
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          # The secret key is passwordless (generated via `minisign -G -W`).
          # Trust boundary is GitHub Secrets, not a passphrase: anyone who can
          # read MINISIGN_SECRET_KEY already controls the repo, and adding a
          # password that also lives in Secrets adds no real protection.
          umask 077
          mkdir -p ~/.minisign
          printf '%s' "$MINISIGN_SECRET_KEY" > ~/.minisign/cocompute.key
          # -W on the sign side: this key has no password.
          minisign -S -W -s ~/.minisign/cocompute.key -m dist/${{ matrix.name }} -x dist/${{ matrix.name }}.minisig
          rm -f ~/.minisign/cocompute.key
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.name }}
            dist/${{ matrix.name }}.minisig

  release:
    needs: [detect-version, build-host]
    if: needs.detect-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          TAG="v${{ needs.detect-version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-version.outputs.version }}
          files: dist/*
          generate_release_notes: true
