name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-host:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: cocompute-host-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: cocompute-host-macos-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: cocompute-host-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: cocompute-host-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build host binary
        run: cargo build --release --target ${{ matrix.target }} -p cocompute_host

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cocompute_host dist/${{ matrix.name }}
          chmod +x dist/${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    needs: build-host
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
